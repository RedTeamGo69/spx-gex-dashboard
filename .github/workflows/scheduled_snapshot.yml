name: Scheduled GEX Snapshot

on:
  # Triggered externally by cron-job.org at 9:28 AM ET (Mon-Fri), two minutes
  # before the bell. The early fire gives the Actions runner time to boot +
  # pip install so Python is already running pre-open work (FRED rate,
  # expirations, table init) during the idle window; scheduled_snapshot.py
  # then parks in its wait loop until 9:30:00 ET before fetching spot +
  # chains. cron-job.org handles DST automatically via America/New_York.
  # Can also be triggered manually from the GitHub Actions UI.
  workflow_dispatch:
    inputs:
      force_weekly_setup:
        description: "Force weekly spread finder rebuild (refit HAR, even on non-Monday). Use after a DB wipe or to refresh after a code change."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  capture:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ticker: [SPX, XSP]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled snapshot (${{ matrix.ticker }})
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TICKER: ${{ matrix.ticker }}
          FORCE_WEEKLY_SETUP: ${{ inputs.force_weekly_setup || 'false' }}
        run: python scheduled_snapshot.py
