name: Scheduled GEX Snapshot

on:
  schedule:
    # US market hours are 9:30 AM - 4:00 PM Eastern Time.
    # Eastern = UTC-4 (EDT, Mar-Nov) or UTC-5 (EST, Nov-Mar).
    # We fire at BOTH possible UTC offsets and let the script skip if
    # it's outside market hours — no manual DST adjustment needed.

    # 9:30 AM ET open scan
    - cron: "30 13 * * 1-5"   # 9:30 AM EDT (Mar-Nov)
    - cron: "30 14 * * 1-5"   # 9:30 AM EST (Nov-Mar)

    # 3:59 PM ET close scan
    - cron: "59 19 * * 1-5"   # 3:59 PM EDT (Mar-Nov)
    - cron: "59 20 * * 1-5"   # 3:59 PM EST (Nov-Mar)

  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled snapshot
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scheduled_snapshot.py
