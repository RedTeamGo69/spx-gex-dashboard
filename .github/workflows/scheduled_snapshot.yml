name: Scheduled GEX Snapshot

on:
  # Triggered externally by cron-job.org at exactly 9:30 AM ET (Mon-Fri).
  # cron-job.org handles DST automatically via America/New_York timezone.
  # Can also be triggered manually from the GitHub Actions UI.
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ticker: [SPX, XSP]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled snapshot (${{ matrix.ticker }})
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TICKER: ${{ matrix.ticker }}
        run: python scheduled_snapshot.py
