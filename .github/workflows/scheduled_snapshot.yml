name: Scheduled GEX Snapshot

on:
  schedule:
    # 9:30 AM ET morning snapshot — freeze opening prices for SPX/VIX,
    # daily expected move, and weekly expected move levels.
    #
    # Eastern = UTC-4 (EDT, Mar-Nov) or UTC-5 (EST, Nov-Mar).
    # We fire at BOTH UTC offsets; the script skips the wrong-DST trigger.
    #
    # GitHub Actions cron can be delayed 5-40+ min, so we fire at 9:15 AM
    # to give deps time to install and still capture data near 9:30.
    - cron: "15 13 * * 1-5"   # 9:15 AM EDT (Mar-Nov)
    - cron: "15 14 * * 1-5"   # 9:15 AM EST (Nov-Mar)

  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  capture:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ticker: [SPX, XSP]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled snapshot (${{ matrix.ticker }})
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TICKER: ${{ matrix.ticker }}
        run: python scheduled_snapshot.py
